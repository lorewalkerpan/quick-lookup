name: Build Windows release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.3.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        shell: pwsh
        run: python -m pip install '.[build]'
      - name: Build Windows executable
        shell: pwsh
        run: .\scripts\build_release.ps1 -SkipInstall
      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:RELEASE_TAG" ".\dist\QuickLookup.exe#QuickLookup.exe" --title "Quick Lookup $env:RELEASE_TAG" --generate-notes
